<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin | Vida no Altar</title>
    <style>
      body {
        margin: 0;
        background: #262523;
        color: #f2ebdf;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .admin-loading {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 32px;
        text-align: center;
      }
      .admin-loading strong {
        display: block;
        color: #d9b752;
        font-size: 1.2rem;
        margin-bottom: 8px;
      }
      .admin-loading p {
        max-width: 560px;
        margin: 0;
        color: rgba(242, 235, 223, 0.76);
      }
      .admin-links {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 1000;
        display: grid;
        gap: 8px;
      }
      .admin-link {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(217, 183, 82, 0.58);
        border-radius: 8px;
        background: #d9b752;
        color: #1b1a18;
        padding: 0 12px;
        font-weight: 850;
        text-decoration: none;
        box-shadow: 0 16px 46px rgba(0, 0, 0, 0.28);
      }
      .admin-link-secondary {
        background: rgba(242, 235, 223, 0.08);
        color: #f2e1ac;
      }
      .admin-link:focus-visible {
        outline: 3px solid #f2e1ac;
        outline-offset: 3px;
      }
      @media (max-width: 520px) {
        .admin-links {
          left: 16px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="admin-links" aria-label="Ferramentas administrativas">
      <a class="admin-link" href="auditor.html">Auditor Admin</a>
      <a class="admin-link admin-link-secondary" href="assistente.html">Assistente Admin</a>
    </nav>
    <div class="admin-loading" data-admin-loading>
      <div>
        <strong>Painel Vida no Altar</strong>
        <p>Carregando a área de edição de conteúdo. A edição fica protegida por login do GitHub quando o OAuth estiver configurado na hospedagem.</p>
      </div>
    </div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.addEventListener("load", () => {
        if (!window.CMS) return;
        document.querySelector("[data-admin-loading]")?.remove();
      });
    </script>
  </body>
</html>
