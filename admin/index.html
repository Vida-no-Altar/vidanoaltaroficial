<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin | Vida no Altar</title>
    <style>
      body {
        margin: 0;
        background: #262523;
        color: #f2ebdf;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .admin-loading {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 32px;
        text-align: center;
      }
      .admin-loading strong {
        display: block;
        color: #d9b752;
        font-size: 1.2rem;
        margin-bottom: 8px;
      }
      .admin-loading p {
        max-width: 520px;
        margin: 0;
        color: rgba(242, 235, 223, 0.76);
      }
    </style>
  </head>
  <body>
    <div class="admin-loading" data-admin-loading>
      <div>
        <strong>Painel Vida no Altar</strong>
        <p>Carregando a área de edição de conteúdo. Esta rota é privada por autenticação do GitHub quando publicada com OAuth configurado.</p>
      </div>
    </div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.addEventListener("load", () => {
        if (!window.CMS) return;
        document.querySelector("[data-admin-loading]")?.remove();
      });
    </script>
  </body>
</html>
